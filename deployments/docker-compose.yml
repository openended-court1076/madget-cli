version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: madget
      POSTGRES_PASSWORD: madget
      POSTGRES_DB: madget
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

volumes:
  pgdata:
